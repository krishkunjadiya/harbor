name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Rebuild native dependencies
        run: npm rebuild @tailwindcss/oxide --foreground-scripts

      - name: Lint
        run: npm run lint

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Bundle size check
        run: |
          npm run build
          size=$(du -sb --exclude='.next/cache' .next | awk '{print $1}')
          if [ $size -gt 943718400 ]; then
            echo "❌ Bundle size exceeds 900MB (excluding cache): $size bytes"
            exit 1
          else
            echo "✅ Bundle size is acceptable (excluding cache): $size bytes"
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
