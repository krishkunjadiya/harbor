name: Resume Launch SLO Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  monitor-resume-launch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Run Resume Launch SLO Monitor
        run: npm run monitor:resume-launch-slo
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESUME_ALERT_WINDOW_MINUTES: ${{ vars.RESUME_ALERT_WINDOW_MINUTES }}
          RESUME_ALERT_MIN_SUCCESS_RATE: ${{ vars.RESUME_ALERT_MIN_SUCCESS_RATE }}
          RESUME_ALERT_MAX_P95_MS: ${{ vars.RESUME_ALERT_MAX_P95_MS }}
