version: 2
updates:
  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 10
    reviewers:
      - "krishkunjadiya"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
    allow:
      - dependency-type: all
    ignore:
      # Add packages to ignore if needed
      # - dependency-name: "react"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/python_worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "krishkunjadiya"
    labels:
      - "dependencies"
      - "python"
      - "python_worker"
    commit-message:
      prefix: "chore(python-deps):"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    reviewers:
      - "krishkunjadiya"
    labels:
      - "ci/cd"
      - "dependencies"
    commit-message:
      prefix: "ci:"

versioning-strategy: "increase-if-necessary"
pull-request-branch-name:
  separator: "/"
